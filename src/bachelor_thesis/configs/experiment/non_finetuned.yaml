model:
  finetuned: False
  checkpoint_path: "base" # not really a path but works nonetheless

lrp:
  mode: "soft_knn_margin_all" # Default
  conv_gamma: ${lrp_params.${lrp.mode}.conv_gamma}
  lin_gamma:  ${lrp_params.${lrp.mode}.lin_gamma}
  temp:       ${lrp_params.${lrp.mode}.temp}
  topk:       ${lrp_params.${lrp.mode}.topk}


lrp_params:
  soft_knn_margin_all:
    conv_gamma: 1.0
    lin_gamma: 0.0005
    temp: 0.005
    topk: null
  soft_knn_margin_topk:
    temp: 0.5
    topk: 1500
    conv_gamma: 0.5
    lin_gamma: 0.0005
  proto_margin:
    temp: 0.005
    topk: 750
    conv_gamma: 0.5
    lin_gamma: 0.0005
  
  similarity:
    temp: null
    topk: null
    conv_gamma: 0.25
    lin_gamma: 0.25