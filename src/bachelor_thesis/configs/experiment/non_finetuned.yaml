model:
  finetuned: False
  checkpoint_path: "base" # not really a path but works nonetheless

lrp:
  mode: "soft_knn_margin_all" # Default
  conv_gamma: ${lrp_params.${lrp.mode}.conv_gamma}
  lin_gamma:  ${lrp_params.${lrp.mode}.lin_gamma}
  temp:       ${lrp_params.${lrp.mode}.temp}
  topk:       ${lrp_params.${lrp.mode}.topk}

sweep:
  temp: ${sweep_params.${lrp.mode}.temp}
  topk: ${sweep_params.${lrp.mode}.topk}
  conv_gammas: ${sweep_params.${lrp.mode}.conv_gammas}
  lin_gammas: ${sweep_params.${lrp.mode}.lin_gammas}

sweep_params:
  soft_knn_margin_all:
    temp: [0.001, 0.005, 0.01]
    topk: null
    conv_gammas: [0.5,0.75,1.5,3.0]
    lin_gammas: [0.0001,0.001,0.005,0.01]
  soft_knn_margin_topk:
    temp: [0.005, 0.01]
    topk: [50, 1500, 7500]
    conv_gammas: [0.5,0.75,1.5,3.0]
    lin_gammas: [0.0001,0.001,0.005,0.01]
  proto_margin:
    temp: [0.005, 0.01]
    topk: [50, 1500, 7500]
    conv_gammas: [0.5,0.75,1.5,3.0]
    lin_gammas: [0.0001,0.001,0.005,0.01]
  similarity:
    temp: null
    topk: null
    conv_gammas: [0.5,0.75,1.5,3.0]
    lin_gammas: [0.0001,0.001,0.005,0.01]

lrp_params:
  soft_knn_margin_all:
    temp: 0.005
    topk: null
    conv_gamma: 0.05
    lin_gamma: 0.01
  soft_knn_margin_topk:
    temp: 0.005 
    topk: 1500
    conv_gamma: 0.25
    lin_gamma: 0.01
  proto_margin:
    temp: 0.01
    topk: 7500
    conv_gamma: 0.25
    lin_gamma: 0.01
  similarity:
    temp: null
    topk: null
    conv_gamma: 0.05
    lin_gamma: 0.1
