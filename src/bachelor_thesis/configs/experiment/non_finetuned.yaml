model:
  finetuned: False
  checkpoint_path: "base" # not really a path but still works

lrp:
  mode: "soft_knn_margin_all" # Default
  conv_gamma: ${lrp_params.${lrp.mode}.conv_gamma}
  lin_gamma:  ${lrp_params.${lrp.mode}.lin_gamma}
  temp:       ${lrp_params.${lrp.mode}.temp}
  topk:       ${lrp_params.${lrp.mode}.topk}


lrp_params:
  soft_knn_margin_all:
    conv_gamma: 0.25
    lin_gamma: 0.001
    temp: 0.015
    topk: null
  soft_knn_margin_topk:
    temp: 0.01
    topk: 5
    conv_gamma: 0.25
    lin_gamma: 0.001
  proto_margin:
    temp: 0.03
    topk: 50
    conv_gamma: 0.1
    lin_gamma: 0.05
  
  similarity:
    temp: null
    topk: null
    conv_gamma: 0.25
    lin_gamma: 0.001