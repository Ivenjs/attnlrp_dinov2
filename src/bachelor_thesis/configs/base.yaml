data:
  #dataset_dir: "/workspaces/vast-gorilla/gorillawatch/data/eval_body_squared_cleaned_open_2024_bigval"
  dataset_dir: "/workspaces/vast-gorilla/gorillawatch/data2/stratified_open_split_NEW/spac23+24-body_face-squared-deduplicated" #TODO change to data 3
  #dataset_dir: "/workspaces/vast-gorilla/gorillawatch/data/berlin_zoo_dataset/body_renamed"
  #dataset_dir: "/workspaces/bachelor_thesis_code/sample_images"
  batch_size: 8
  base_mask_dir: "/workspaces/vast-gorilla/gorillawatch/iven_thesis/masks"
  output_base_dir: "/workspaces/vast-gorilla/gorillawatch/iven_thesis/seg_analysis"
  analysis_split: "test"
  #test or val?

seed: 161

db:
  db_schema: "public"
  feature_type: "body"

eval:
  patches_per_step: 50
  baseline_value: "mean" #mean or black

knn:
  distance_metric: "cosine"
  k: 5
  db_embeddings_dir: "/workspaces/vast-gorilla/gorillawatch/iven_thesis/knn_db"

model:
  img_size: 518
  backbone: "vit_giant_patch14_dinov2.lvd142m"
  embedding_dim: 256
  patch_size: 14
  model_dtype: "float16"

plots:
  red: [162, 41, 64]
  orange: [206, 104, 45]
  yellow: [236, 172, 61]
  gray: [172, 175, 178]

wandb:
  project: "bachelor_thesis"
  entity: "gorillawatch"

lrp:
  mode: "soft_knn_margin"
  cross_encounter: True
  # "soft_knn_margin" or "proto_margin" or "similarity"
  db_relevances_dir: "/workspaces/vast-gorilla/gorillawatch/iven_thesis/relevance_db"


sweep:
  evaluation_metrics: []
  distance_metrics: ["cosine"]
  holdout_percentage: 0.2
  temp: [0.01, 0.03]
  #0.01, 0.03, 0.07, 0.15
  queries_per_class: 2
  topk_neg: [5, 50]
  # 5, 10, 50
  conv_gammas: [0.001, 0.05, 0.1, 0.25]
  #0.001, 0.05, 0.1, 0.25
  # in paper: 0.05, 0.1, 0.25
  #0.1, 0.15,0.25, 0.7, 1.0
  #[0.1, 0.15,0.25, 0.4, 0.7, 1.0] 
  lin_gammas: [0.001, 0.05, 0.1, 0.25]
  #0.001, 0.05, 0.1, 0.25
    # in paper: 0.05, 0.1, 0.25
  #0.001, 0.025, 0.05, 0.075, 0.1
